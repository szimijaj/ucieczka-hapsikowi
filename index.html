<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucieczka Śpioszka! 😴⚡</title>
    <style>
        body {
            background: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 1.8rem;
        }

        #gameContainer {
            position: relative;
            width: 600px;
            height: 400px;
            background: #27ae60; /* Zielona trawka */
            border: 4px solid #2c3e50;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .game-object {
            position: absolute;
            font-size: 35px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.1s linear;
        }

        #spioszek { z-index: 3; }
        #zolwik { z-index: 2; }
        #norka { z-index: 1; font-size: 45px; }

        /* Ekran końcowy */
        #cutscene {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #hapsik {
            font-size: 100px;
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #capsText {
            font-size: 5rem;
            color: #e74c3c;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .instructions {
            margin-top: 15px;
            color: #bdc3c7;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Szybko! Śpioszek musi uciekać! 🏃‍♀️💨</h1>
    
    <div id="gameContainer">
        <!-- Obiekty gry -->
        <div id="spioszek" class="game-object">😴</div>
        <div id="zolwik" class="game-object">🐢</div>
        <div id="norka" class="game-object">🕳️</div>

        <!-- Ekran "Hapsika" -->
        <div id="cutscene">
            <div id="hapsik">👾</div> 
            <div id="capsText">HAPS!</div>
        </div>
    </div>

    <p class="instructions">Używaj strzałek na klawiaturze (lub WASD), aby uciec do norki!</p>

    <script>
        // Pozycje obiektów
        const spioszek = { x: 50, y: 180, speed: 15 };
        const zolwik = { x: 500, y: 180, speed: 2 };
        const norka = { x: 300, y: 300 };

        const spioszekEl = document.getElementById('spioszek');
        const zolwikEl = document.getElementById('zolwik');
        const norkaEl = document.getElementById('norka');
        const cutscene = document.getElementById('cutscene');
        const hapsikEl = document.getElementById('hapsik');
        const capsTextEl = document.getElementById('capsText');

        let gameActive = true;

        // Rozstawienie początkowe
        function init() {
            updatePosition(spioszekEl, spioszek);
            updatePosition(zolwikEl, zolwik);
            updatePosition(norkaEl, norka);
            gameLoop();
        }

        function updatePosition(element, obj) {
            element.style.left = obj.x + 'px';
            element.style.top = obj.y + 'px';
        }

        // Sterowanie Śpioszkiem
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            switch(e.key.toLowerCase()) {
                case 'arrowup': case 'w':
                    if (spioszek.y > 0) spioszek.y -= spioszek.speed;
                    break;
                case 'arrowdown': case 's':
                    if (spioszek.y < 360) spioszek.y += spioszek.speed;
                    break;
                case 'arrowleft': case 'a':
                    if (spioszek.x > 0) spioszek.x -= spioszek.speed;
                    break;
                case 'arrowright': case 'd':
                    if (spioszek.x < 560) spioszek.x += spioszek.speed;
                    break;
            }
            updatePosition(spioszekEl, spioszek);
        });

        // AI Żółwika Kłamczuszka i logika gry
        function gameLoop() {
            if (!gameActive) return;

            // Żółwik powoli, podstępnie zmierza w stronę Śpioszka
            if (zolwik.x < spioszek.x) zolwik.x += zolwik.speed;
            if (zolwik.x > spioszek.x) zolwik.x -= zolwik.speed;
            if (zolwik.y < spioszek.y) zolwik.y += zolwik.speed;
            if (zolwik.y > spioszek.y) zolwik.y -= zolwik.speed;
            
            updatePosition(zolwikEl, zolwik);

            // Sprawdzenie czy Śpioszek dotarł do norki (sukces, który aktywuje niespodziankę)
            if (getDistance(spioszek, norka) < 30) {
                triggerHapsik();
            }

            // Sprawdzenie czy Żółwik złapał Śpioszka wcześniej
            if (getDistance(spioszek, zolwik) < 25) {
                // Żółwik łapie -> restart, bo Śpioszek musi zdążyć do norki!
                spioszek.x = 50;
                spioszek.y = 180;
                zolwik.x = 500;
                zolwik.y = 180;
                alert("Żółwik Kłamczuszek Cię dogonił! Próbuj gonić do norki! 🕳️");
            }

            requestAnimationFrame(gameLoop);
        }

        function getDistance(obj1, obj2) {
            return Math.sqrt(Math.pow(obj1.x - obj2.x, 2) + Math.pow(obj1.y - obj2.y, 2));
        }

        // FINAŁ: Hapsik wyskakuje i mówi CAPS!
        function triggerHapsik() {
            gameActive = false;
            
            // Ukrywamy bohaterów na planszy
            spioszekEl.style.display = 'none';
            norkaEl.style.display = 'none';
            zolwikEl.style.display = 'none';

            // Odpalamy cutscenkę
            cutscene.style.display = 'flex';

            // Animacja wyskakującego Hapsika
            setTimeout(() => {
                hapsikEl.style.transform = 'scale(1.5)';
            }, 100);

            // Napis CAPS! pojawia się ułamek sekundy później z tąpnięciem
            setTimeout(() => {
                capsTextEl.style.opacity = '1';
                capsTextEl.style.transform = 'scale(1)';
                
                // Efekt lekkiego trzęsienia ekranu przy "CAPS!"
                document.getElementById('gameContainer').style.animation = 'shake 0.5s';
            }, 600);
        }

        init();
    </script>

    <style>
        /* Animacja tąpnięcia dla planszy */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); } 
        }
    </style>
</body>
</html>
